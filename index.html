<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线查询工具箱</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
    * { font-family: 'Inter', system-ui, sans-serif; }

    /* 亮色主题（默认） */
    :root {
      --bg: #f5f5f7; --text: #1a1a2e; --text-soft: #666; --text-muted: #999;
      --glass-bg: rgba(255,255,255,0.8); --glass-border: rgba(0,0,0,0.08);
      --card-hover-bg: rgba(99,102,241,0.05); --card-active-bg: rgba(99,102,241,0.1);
      --card-active-border: #6366f1;
      --input-bg: rgba(0,0,0,0.04); --input-border: rgba(0,0,0,0.1);
      --row-hover: rgba(0,0,0,0.03);
      --badge-bg: rgba(99,102,241,0.1); --badge-color: #6366f1;
      --scrollbar: rgba(0,0,0,0.1);
      --accent-green: #059669; --accent-indigo: #4f46e5;
    }

    /* 暗色主题 */
    [data-theme="dark"] {
      --bg: #0f0f1a; --text: #e5e5e5; --text-soft: #aaa; --text-muted: #666;
      --glass-bg: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.08);
      --card-hover-bg: rgba(99,102,241,0.05); --card-active-bg: rgba(99,102,241,0.1);
      --card-active-border: #6366f1;
      --input-bg: rgba(255,255,255,0.06); --input-border: rgba(255,255,255,0.1);
      --row-hover: rgba(255,255,255,0.05);
      --badge-bg: rgba(99,102,241,0.15); --badge-color: #818cf8;
      --scrollbar: rgba(255,255,255,0.1);
      --accent-green: #34d399; --accent-indigo: #818cf8;
    }

    body { background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s, color 0.3s; }
    .glass { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); }
    .tool-card { transition: all 0.3s; cursor: pointer; }
    .tool-card:hover { border-color: rgba(99,102,241,0.5); background: var(--card-hover-bg); }
    .tool-card.active { border-color: var(--card-active-border); background: var(--card-active-bg); }
    .result-row { transition: background 0.2s; }
    .result-row:hover { background: var(--row-hover); }
    input[type="text"] { background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); }
    input[type="text"]::placeholder { color: var(--text-muted); }
    input[type="text"]:focus { border-color: #6366f1; outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    .badge { background: var(--badge-bg); color: var(--badge-color); }
    .text-soft { color: var(--text-soft); }
    .text-muted { color: var(--text-muted); }
    .accent-green { color: var(--accent-green); }
    .accent-indigo { color: var(--accent-indigo); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    .theme-btn { background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); cursor: pointer; transition: all 0.2s; }
    .theme-btn:hover { border-color: #6366f1; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="border-b border-white/5 py-6 px-6">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🧰</span>
        <div>
          <h1 class="text-lg font-black tracking-tight">在线工具箱</h1>
          <p class="text-xs text-soft">免费实用查询工具集合</p>
        </div>
      </div>
      <span class="badge px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest" id="tool-count">2 个工具</span>
      <button id="theme-toggle" class="theme-btn px-3 py-1 rounded-full text-sm font-bold" onclick="toggleTheme()">🌙</button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">

    <!-- 工具选择卡片 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-10" id="tool-cards">
      <div class="tool-card glass rounded-2xl p-6 active" data-tool="phone-code" onclick="switchTool('phone-code')">
        <div class="text-3xl mb-3">📞</div>
        <h2 class="font-bold text-base">国家区号查询</h2>
        <p class="text-xs text-soft mt-2">输入国家名称或区号，快速查询全球 200+ 国家/地区的电话区号</p>
      </div>
      <div class="tool-card glass rounded-2xl p-6" data-tool="gdp" onclick="switchTool('gdp')">
        <div class="text-3xl mb-3">💰</div>
        <h2 class="font-bold text-base">人均 GDP 查询</h2>
        <p class="text-xs text-soft mt-2">查询全球国家/地区的人均 GDP（美元），数据来源：世界银行 2023</p>
      </div>
      <div class="tool-card glass rounded-2xl p-6 opacity-40 cursor-default" style="pointer-events:none;">
        <div class="text-3xl mb-3">🔜</div>
        <h2 class="font-bold text-base">更多工具</h2>
        <p class="text-xs text-soft mt-2">持续更新中…</p>
      </div>
    </div>

    <!-- 查询区域 -->
    <div class="glass rounded-3xl p-8">
      <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 mb-6">
        <h3 class="font-black text-xl" id="tool-title">📞 国家区号查询</h3>
        <input id="search" type="text" placeholder="输入国家名、英文名或区号…" class="flex-1 w-full sm:w-auto rounded-xl px-5 py-3 text-sm text-white placeholder-white/30" autocomplete="off">
      </div>

      <div class="text-xs text-muted mb-4" id="result-info">共 <span id="total">0</span> 条结果</div>

      <div id="result-header" class="hidden sm:grid grid-cols-4 gap-4 px-4 py-2 text-[10px] uppercase tracking-widest text-muted font-bold border-b border-white/5 mb-2">
        <div>国旗</div>
        <div>国家/地区</div>
        <div id="col3-header">区号</div>
        <div id="col4-header">英文名</div>
      </div>

      <div id="results" class="max-h-[60vh] overflow-y-auto space-y-1"></div>
    </div>
  </main>

  <footer class="border-t border-white/5 py-8 text-center text-xs text-muted">
    © 2026 在线工具箱 · 数据来源：世界银行 / REST Countries · 仅供参考
  </footer>

  <script>
    // === 明暗主题切换 ===
    function getPreferredTheme() {
      const saved = localStorage.getItem('theme');
      if (saved) return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('theme', theme);
    }
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }
    applyTheme(getPreferredTheme());
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
    });
  </script>

    // ============ 当前工具 ============
    let currentTool = 'phone-code';

    function switchTool(tool) {
      currentTool = tool;
      document.querySelectorAll('.tool-card').forEach(c => c.classList.remove('active'));
      document.querySelector(`[data-tool="${tool}"]`)?.classList.add('active');

      const search = document.getElementById('search');
      const title = document.getElementById('tool-title');
      const col3 = document.getElementById('col3-header');
      const col4 = document.getElementById('col4-header');

      if (tool === 'phone-code') {
        title.textContent = '📞 国家区号查询';
        search.placeholder = '输入国家名、英文名或区号…';
        col3.textContent = '区号';
        col4.textContent = '英文名';
      } else if (tool === 'gdp') {
        title.textContent = '💰 人均 GDP 查询';
        search.placeholder = '输入国家名或英文名…';
        col3.textContent = '人均GDP (USD)';
        col4.textContent = '英文名';
      }

      search.value = '';
      render('');
    }

    function render(query) {
      const q = query.trim().toLowerCase();
      let data, rows;

      if (currentTool === 'phone-code') {
        data = PHONE_DATA.filter(d =>
          !q || d.zh.includes(q) || d.en.toLowerCase().includes(q) || d.code.includes(q)
        );
        rows = data.map(d => `
          <div class="result-row grid grid-cols-2 sm:grid-cols-4 gap-4 px-4 py-3 rounded-xl items-center">
            <div class="text-2xl">${d.f}</div>
            <div class="font-bold text-sm">${d.zh}</div>
            <div class="accent-indigo font-mono font-bold text-lg">${d.code}</div>
            <div class="text-soft text-sm">${d.en}</div>
          </div>
        `).join('');
      } else if (currentTool === 'gdp') {
        data = GDP_DATA.filter(d =>
          !q || d.zh.includes(q) || d.en.toLowerCase().includes(q)
        );
        // sort by GDP descending
        data.sort((a, b) => b.gdp - a.gdp);
        rows = data.map((d, i) => `
          <div class="result-row grid grid-cols-2 sm:grid-cols-4 gap-4 px-4 py-3 rounded-xl items-center">
            <div class="flex items-center gap-2"><span class="text-2xl">${d.f}</span><span class="text-muted text-xs font-bold">#${i + 1}</span></div>
            <div class="font-bold text-sm">${d.zh}</div>
            <div class="accent-green font-mono font-bold">$${d.gdp.toLocaleString()}</div>
            <div class="text-soft text-sm">${d.en}</div>
          </div>
        `).join('');
      }

      document.getElementById('results').innerHTML = rows || '<div class="text-center text-muted py-10">未找到匹配结果</div>';
      document.getElementById('total').textContent = data.length;
    }

    // 搜索事件
    document.getElementById('search').addEventListener('input', e => render(e.target.value));

    // 初始化
    render('');
  </script>
